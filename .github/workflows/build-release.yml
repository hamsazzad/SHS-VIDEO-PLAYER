name: Build Release APKs

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build release APKs
        run: |
          ./gradlew assembleRelease \
            -x lintVitalRelease \
            -x lintVitalAnalyzeRelease \
            --no-daemon \
            --max-workers 2

      - name: List APKs
        run: ls -lh app/build/outputs/apk/release/

      - name: Verify APK signatures
        run: |
          for apk in app/build/outputs/apk/release/*.apk; do
            echo "=== $(basename $apk) ==="
            $ANDROID_HOME/build-tools/35.0.0/apksigner verify --print-certs "$apk" | grep "DN:"
          done

      - name: Upload APKs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shs-player-release-apks
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.0
          name: "SHS Video Player v1.1.0 - Stable"
          body: |
            ## SHS Video Player v1.1.0

            **Bug fixes in this release:**
            - Fixed crash on launch (`LibVLC nativeNew` crash on Android 10+ low-end devices)
            - Removed aggressive HW codec flags that caused initialization failure
            - Minimal safe LibVLC init; codec auto-selected by engine

            **Package:**  `com.shs.videoplayer`

            | APK | Architecture |
            |-----|-------------|
            | app-arm64-v8a-release.apk | 64-bit ARM (most modern phones) |
            | app-armeabi-v7a-release.apk | 32-bit ARM (older devices) |
            | app-x86-release.apk | x86 (emulators) |
            | app-x86_64-release.apk | 64-bit x86 (emulators) |
            | app-universal-release.apk | All architectures |

            > Core Engine: LibVLC (VideoLAN) | UI Lib: NextLib (anilbeesetti)
          files: app/build/outputs/apk/release/*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
